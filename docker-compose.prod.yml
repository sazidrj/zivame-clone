# docker-compose.prod.yml
# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.9'

services:
  postgres:
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  redis:
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10

  backend:
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    command: >
      gunicorn app.main:app
      -w 4
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 30
      --keep-alive 5
      --log-level warning
    volumes:
      - static_uploads:/app/static/uploads

  celery_worker:
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=warning --concurrency=2

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend_dist:/app/dist

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/sites-available/default:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_uploads:/app/static/uploads:ro
      - frontend_dist:/srv/zivame/frontend/dist:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_uploads:
  frontend_dist:
