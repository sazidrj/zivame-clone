# nginx/nginx.conf
# Production Nginx config — reverse proxies to FastAPI backend and serves React frontend.
# Place this at /etc/nginx/sites-available/zivame on your server.

upstream backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL (via Certbot / Let's Encrypt — FREE) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"             always;
    add_header X-XSS-Protection       "1; mode=block"       always;
    add_header Referrer-Policy        "strict-origin"       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 10M;

    # ── API — proxy to FastAPI ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Rate limiting (backed by nginx limit_req_zone)
        limit_req zone=api burst=20 nodelay;
    }

    # ── Static uploads (local storage) ───────────────────────────────────────
    location /static/uploads/ {
        alias /app/static/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API docs (dev only — remove in production) ───────────────────────────
    # location /docs { proxy_pass http://backend; }

    # ── React frontend (SPA) ─────────────────────────────────────────────────
    root /srv/zivame/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# ── Rate limiting zones (add to nginx.conf http block) ───────────────────────
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
