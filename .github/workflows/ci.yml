name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # Test database — in-memory SQLite via asyncpg
  DATABASE_URL: sqlite+aiosqlite:///./test.db
  REDIS_URL: redis://localhost:6379/0
  JWT_SECRET_KEY: test-secret-key-for-ci-only
  APP_ENV: test
  APP_DEBUG: "false"

jobs:
  # ── Backend tests ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiosqlite  # SQLite driver for tests

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/ --select E,F,I || true  # Non-blocking lint

      - name: Type check with mypy
        working-directory: backend
        run: mypy app/ --ignore-missing-imports || true  # Non-blocking

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short --no-header

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          directory: backend
          fail_ci_if_error: false

  # ── Frontend build ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000/api/v1
        run: npm run build

  # ── Docker build check ─────────────────────────────────────────────────────
  docker:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose config --quiet
